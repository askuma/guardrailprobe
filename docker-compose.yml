# Copy .env.example to .env and fill in credentials before running.
# Required: at least one backend credential so probes are not all SKIPPED.
#
# Start dashboard:   docker compose up
# One-shot benchmark: docker compose run --rm guardrailprobe \
#                       guardrailprobe run --year 2026 --month 6 --output-dir /app/reports

services:
  guardrailprobe:
    build:
      context: .
      args:
        SKIP_SPACY: ${SKIP_SPACY:-0}          # set to 1 to skip spaCy model download
        GUARDRAILS_TOKEN: ${GUARDRAILS_TOKEN:-} # authenticates hub validator install
    image: guardrailprobe:0.1.0
    container_name: guardrailprobe
    ports:
      - "8080:8080"            # Flask dashboard  →  http://localhost:8080
    env_file:
      - path: .env             # Copy .env.example → .env and fill in values
        required: false        # Container starts even without a .env file
    environment:
      # ── Lakera Guard ──────────────────────────────────────────────────────
      - LAKERA_GUARD_API_KEY=${LAKERA_GUARD_API_KEY:-}

      # ── OpenAI Moderation + NeMo OpenAI provider ─────────────────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # ── Azure Content Safety ──────────────────────────────────────────────
      - AZURE_CONTENT_SAFETY_KEY=${AZURE_CONTENT_SAFETY_KEY:-}
      - AZURE_CONTENT_SAFETY_ENDPOINT=${AZURE_CONTENT_SAFETY_ENDPOINT:-}

      # ── Azure Prompt Shields (shares credentials with azure_content_safety) ─
      # No separate key needed — AZURE_CONTENT_SAFETY_KEY / ENDPOINT are reused.

      # ── AWS Bedrock Guardrails ─────────────────────────────────────────────
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_BEDROCK_GUARDRAIL_ID=${AWS_BEDROCK_GUARDRAIL_ID:-}
      - AWS_BEDROCK_GUARDRAIL_VERSION=${AWS_BEDROCK_GUARDRAIL_VERSION:-DRAFT}

      # ── NeMo LLM provider — priority: NEMO_OPENAI_API_KEY → AWS Bedrock → OPENROUTER → OPENAI ──
      # Without any key NeMo runs in colang pattern-matching mode (no API calls).
      # NEMO_OPENAI_API_KEY: explicit NeMo-only OpenAI key (highest priority).
      # AWS Bedrock:         uses existing AWS_ACCESS_KEY_ID/SECRET creds — no per-minute
      #                      rate limits, recommended when AWS credentials are available.
      # NEMO_BEDROCK_MODEL:  Bedrock model for NeMo (default: us.meta.llama3-3-70b-instruct-v1:0).
      # OPENROUTER_API_KEY:  free-tier fallback (16 req/min limit — may rate-limit benchmarks).
      # OPENAI_API_KEY:      used as final fallback if nothing else is available.
      - NEMOGUARDRAILS_LLM_FRAMEWORK=langchain
      - NEMO_OPENAI_API_KEY=${NEMO_OPENAI_API_KEY:-}
      - NEMO_OPENAI_MODEL=${NEMO_OPENAI_MODEL:-gpt-4o-mini}
      - NEMO_BEDROCK_MODEL=${NEMO_BEDROCK_MODEL:-amazon.nova-pro-v1:0}
      # OpenRouter — free-tier OpenAI-compatible gateway (recommended for NeMo)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-nvidia/nemotron-3-nano-30b-a3b:free}
      # Azure OpenAI (alternative to OPENAI_API_KEY / OpenRouter)
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-gpt-4o-mini}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}
      # Ollama — local LLM, no API key required
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}

      # ── GuardrailsAI hub token (optional — regex fallback always active) ───
      - GUARDRAILS_TOKEN=${GUARDRAILS_TOKEN:-}

      # ── LlamaFirewall / LLM Guard — HuggingFace token ───────────────────────
      # Accept license at huggingface.co/meta-llama/Llama-Prompt-Guard-2-86M first.
      # Set HF_TOKEN to download the model on first run; subsequent runs use the cache
      # from ~/.cache/huggingface on the host (mounted as a volume below).
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}

      # ── GA Guard ──────────────────────────────────────────────────────────
      - GA_GUARD_API_URL=${GA_GUARD_API_URL:-}                        # required (must be https://)
      - GA_GUARD_API_KEY=${GA_GUARD_API_KEY:-}                        # optional
      - GA_GUARD_AUTH_HEADER=${GA_GUARD_AUTH_HEADER:-Authorization}   # optional (default: Authorization)
      - GA_GUARD_AUTH_PREFIX=${GA_GUARD_AUTH_PREFIX:-Bearer}          # optional (default: Bearer)
      - GA_GUARD_TEXT_FIELD=${GA_GUARD_TEXT_FIELD:-text}              # optional (default: text)
      - GA_GUARD_CONTEXT_FIELD=${GA_GUARD_CONTEXT_FIELD:-context}     # optional (default: context)
      - GA_GUARD_TIMEOUT_SECS=${GA_GUARD_TIMEOUT_SECS:-10}            # optional (default: 10)

      # ── PDF report signing ─────────────────────────────────────────────────
      - GUARDRAIL_SIGNING_KEY_P12=/app/certs/guardrail_signing.p12

    volumes:
      - guardrailprobe_reports:/app/reports          # benchmark output (PDF, JSON, MD)
      - ./docs:/app/docs                             # committed benchmark artifacts
      - ./certs:/app/certs:ro                        # signing key (never commit the .p12)
      # LlamaFirewall / LLM Guard — install on host, then restart the container.
      # If ./site-packages is empty, the entrypoint skips it gracefully.
      #   pip install llamafirewall llm-guard --target ./site-packages
      - ./site-packages:/app/site-packages:ro
      # HuggingFace model cache — stored alongside ./site-packages so all
      # ML assets live in the project directory, not in the user's home.
      # Create it first: mkdir -p ./hf_cache
      - ./hf_cache:/home/guardrailprobe/.cache/huggingface

    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  guardrailprobe_reports:
    driver: local
